name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 1"
  push:
    branches: [main]

# Minimal workflow default; the analysis job elevates only what Scorecard needs.
permissions:
  contents: read

# Only the latest Scorecard run per ref is meaningful.
concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload the Scorecard SARIF to the Security tab
      id-token: write # publish signed results to the public Scorecard API
      contents: read # checkout the repository
      actions: read # read workflow metadata for the Token-Permissions/CI checks
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results: true enables the scorecard.dev badge + history.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to Security tab
        uses: github/codeql-action/upload-sarif@65216971a11ded447a6b76263d5a144519e5eee1 # codeql-bundle-v2.25.2
        with:
          sarif_file: results.sarif
          category: scorecard
