# SearXNG settings for Palena
# Docs: https://docs.searxng.org/admin/settings.html

use_default_settings: true

general:
  instance_name: "palena-searxng"
  debug: false

search:
  safe_search: 1          # 0=off, 1=moderate, 2=strict
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json                 # required — Palena uses the JSON API

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "palena-dev-secret-change-in-production"
  limiter: false           # disable rate limiting for internal use
  public_instance: false

ui:
  static_use_hash: true

engines:
  # General
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  # News
  - name: google news
    engine: google_news
    shortcut: gn
    disabled: false

  - name: bing news
    engine: bing_news
    shortcut: bin
    disabled: false

  # Code
  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false

  # Science
  - name: google scholar
    engine: google_scholar
    shortcut: gs
    disabled: false

outgoing:
  request_timeout: 8
  max_request_timeout: 15
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
