# Full-stack Docker Compose for Palena MCP Server.
# Includes all sidecars: SearXNG, Presidio, Playwright, FlashRank.
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up --build
#
# See deploy/docker-compose.minimal.yml for a lighter setup.

services:
  # ===========================================================================
  # Palena MCP Server
  # ===========================================================================
  palena:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ../config/palena.yaml:/config/palena.yaml:ro
    environment:
      PALENA_CONFIG_PATH: /config/palena.yaml
      PALENA_SEARCH_SEARXNG_URL: http://searxng:8080
      PALENA_SCRAPER_PLAYWRIGHT_ENDPOINT: ws://playwright:3000
      PALENA_PII_ANALYZER_URL: http://presidio-analyzer:5002
      PALENA_PII_ANONYMIZER_URL: http://presidio-anonymizer:5001
      PALENA_INJECTION_ENABLED: "true"
      PALENA_INJECTION_PREDICT_URL: http://injection-guard:8080
      PALENA_RERANKER_PROVIDER: flashrank
      PALENA_RERANKER_ENDPOINT: http://flashrank:8080
    depends_on:
      searxng:
        condition: service_started
      presidio-analyzer:
        condition: service_started
      presidio-anonymizer:
        condition: service_started
      playwright:
        condition: service_started
      injection-guard:
        condition: service_healthy
      flashrank:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/palena", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ===========================================================================
  # SearXNG — metasearch engine (hard dependency)
  # ===========================================================================
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: http://localhost:8888/
    restart: unless-stopped

  # ===========================================================================
  # Presidio Analyzer — PII entity detection
  # ===========================================================================
  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    ports:
      - "5002:5002"
    environment:
      PORT: "5002"
    restart: unless-stopped

  # ===========================================================================
  # Presidio Anonymizer — PII masking/replacement
  # ===========================================================================
  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    ports:
      - "5001:5001"
    environment:
      PORT: "5001"
    restart: unless-stopped

  # ===========================================================================
  # Playwright — headless browser pool for L1/L2 scraping
  # ===========================================================================
  # Uses Microsoft's official Playwright image and runs `playwright run-server`
  # to expose a WebSocket endpoint that the Go client connects to via
  # BrowserType.Connect(). The image ships Chromium, Firefox, and WebKit
  # pre-installed; Palena only drives Chromium today.
  playwright:
    image: mcr.microsoft.com/playwright:v1.57.0-jammy
    command:
      - npx
      - -y
      - playwright@1.57.0
      - run-server
      - --port
      - "3000"
      - --host
      - 0.0.0.0
    ports:
      - "3000:3000"
    restart: unless-stopped

  # ===========================================================================
  # Injection Guard — DeBERTa-v3 prompt-injection classifier (HF TEI sidecar)
  # ===========================================================================
  # Serves deepset/deberta-v3-base-injection via Hugging Face's
  # text-embeddings-inference image. The image auto-detects the model task
  # and exposes POST /predict for sequence classification.
  #
  # Swap in a fine-tuned successor by changing --model-id to a Hugging Face
  # repo or a local path mounted into /data. No Palena code changes are
  # needed — just update PALENA_INJECTION_MODEL for audit-log accuracy.
  #
  # HuggingFace only publishes x86_64 builds of TEI to ghcr.io. On Apple
  # Silicon the image runs under QEMU emulation (functional but slow — fine
  # for dev, not representative of prod throughput). For native arm64
  # performance, build from source:
  #   git clone https://github.com/huggingface/text-embeddings-inference
  #   docker build text-embeddings-inference -f text-embeddings-inference/Dockerfile-arm64 \
  #     --platform=linux/arm64 -t tei-cpu-arm64:local
  # Then override the image here with `tei-cpu-arm64:local` and remove the
  # platform directive below.
  injection-guard:
    image: ghcr.io/huggingface/text-embeddings-inference:${TEI_IMAGE_TAG:-cpu-1.9}
    platform: linux/amd64
    command:
      - --model-id
      - deepset/deberta-v3-base-injection
      - --port
      - "8080"
    ports:
      - "8082:8080"
    volumes:
      - injection-guard-cache:/data
    environment:
      HF_HUB_ENABLE_HF_TRANSFER: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ===========================================================================
  # FlashRank — CPU-based cross-encoder reranker
  # ===========================================================================
  flashrank:
    build:
      context: .
      dockerfile: Dockerfile.flashrank
    ports:
      - "8081:8080"
    environment:
      FLASHRANK_MODEL: ms-marco-MiniLM-L-12-v2
      PORT: "8080"
    restart: unless-stopped

volumes:
  injection-guard-cache: